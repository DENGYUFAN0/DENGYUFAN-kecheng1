<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>中国自然景观 | 중국 자연</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: black;
  color: white;
}

/* 🎥 视频区 */
.video-section {
  position: relative;
  height: 200vh; /* 关键：用于滚动控制 */
}

.video-wrap {
  position: sticky;
  top: 0;
  height: 100vh;
  overflow: hidden;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scale(1.2); /* 更电影感 */
}

/* 黑色渐变遮罩（高级感关键） */
.video-overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.7));
}

/* 标题 */
.hero-text {
  position: absolute;
  top: 40%;
  width: 100%;
  text-align: center;
  z-index: 2;
}

h1 {
  font-size: 64px;
  margin: 0;
  transition: all 0.3s;
}

/* 按钮 */
.btn {
  margin-top: 20px;
  display: inline-block;
  padding: 10px 25px;
  border: 1px solid white;
  cursor: pointer;
}

/* 内容区 */
.section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 40px;
  opacity: 0;
  transform: translateY(80px);
  transition: 1s;
}

/* 视差背景 */
.parallax {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') center/cover fixed;
}
</style>
</head>

<body>

<!-- 🎬 视频滚动控制 -->
<section class="video-section">
  <div class="video-wrap">
    <video id="video" autoplay muted loop playsinline>
      <source src="shiping.mp4" type="video/mp4">
    </video>

    <div class="video-overlay"></div>

    <div class="hero-text">
      <h1 id="title">探索中国绝美自然</h1>
      <div class="btn" onclick="switchLang()">中文 / 한국어</div>
    </div>
  </div>
</section>

<!-- 🌄 内容 -->
<section class="section" id="s1">张家界</section>
<section class="parallax"></section>
<section class="section" id="s2">九寨沟</section>
<section class="section" id="s3">黄山</section>

<script>
const video = document.getElementById('video');
const title = document.getElementById('title');
const sections = document.querySelectorAll('.section');

/* 🎥 视频滚动控制（核心） */
window.addEventListener('scroll', () => {
  let scroll = window.scrollY;
  let max = window.innerHeight;

  let progress = Math.min(scroll / max, 1);

  /* 视频缩放 */
  video.style.transform = `scale(${1.2 - progress * 0.2})`;

  /* 标题缩放 + 渐隐 */
  title.style.transform = `scale(${1 - progress * 0.3})`;
  title.style.opacity = 1 - progress * 1.2;
});

/* 内容渐入 */
window.addEventListener('scroll', () => {
  sections.forEach(sec => {
    let top = sec.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      sec.style.opacity = 1;
      sec.style.transform = "translateY(0)";
    }
  });
});

/* 🌐 多语言 */
let lang = 'zh';

const text = {
  zh: {
    title: "探索中国绝美自然",
    s1: "张家界",
    s2: "九寨沟",
    s3: "黄山"
  },
  kr: {
    title: "중국의 아름다운 자연을 탐험하세요",
    s1: "장가계",
    s2: "구채구",
    s3: "황산"
  }
};

function switchLang() {
  lang = lang === 'zh' ? 'kr' : 'zh';

  document.getElementById("title").innerText = text[lang].title;
  document.getElementById("s1").innerText = text[lang].s1;
  document.getElementById("s2").innerText = text[lang].s2;
  document.getElementById("s3").innerText = text[lang].s3;
}
</script>

</body>
</html>
