<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>中国自然景观 | 중국 자연 경관</title>

<!-- AOS 动画库 -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #000;
  color: white;
  overflow-x: hidden;
}

/* 粒子背景 */
#particles-js {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* 首页 */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  font-size: 60px;
  margin: 0;
}

.btn {
  margin-top: 20px;
  padding: 10px 25px;
  border: 1px solid white;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: white;
  color: black;
}

/* 展示区 */
.section {
  padding: 80px 10%;
}

.gallery {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}

.card {
  width: calc(33% - 20px);
  height: 300px;
  background-size: cover;
  background-position: center;
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.4s;
}

.card:hover {
  transform: scale(1.05);
}

.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 15px;
  background: rgba(0,0,0,0.6);
}

/* 响应式 */
@media(max-width: 768px) {
  .card {
    width: 100%;
  }
}
</style>
</head>

<body>

<!-- 粒子背景 -->
<div id="particles-js"></div>

<!-- 首页 -->
<section class="hero">
  <h1 id="title">探索中国绝美自然</h1>
  <div class="btn" onclick="switchLang()">中文 / 한국어</div>
</section>

<!-- 景点 -->
<section class="section">
  <div class="gallery">

    <div class="card" data-aos="fade-up"
    style="background-image:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470')">
      <div class="overlay" id="p1">张家界 / 장가계</div>
    </div>

    <div class="card" data-aos="fade-up" data-aos-delay="100"
    style="background-image:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee')">
      <div class="overlay" id="p2">九寨沟 / 구채구</div>
    </div>

    <div class="card" data-aos="fade-up" data-aos-delay="200"
    style="background-image:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e')">
      <div class="overlay" id="p3">黄山 / 황산</div>
    </div>

  </div>
</section>

<!-- JS 库 -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>

<script>
/* AOS 初始化 */
AOS.init({
  duration: 1000
});

/* 粒子效果 */
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    size: { value: 3 },
    move: { speed: 1 },
    line_linked: { enable: true }
  }
});

/* 多语言 */
let lang = 'zh';

const text = {
  zh: {
    title: "探索中国绝美自然",
    p1: "张家界",
    p2: "九寨沟",
    p3: "黄山"
  },
  kr: {
    title: "중국의 아름다운 자연을 탐험하세요",
    p1: "장가계",
    p2: "구채구",
    p3: "황산"
  }
};

function switchLang() {
  lang = (lang === 'zh') ? 'kr' : 'zh';

  document.getElementById("title").innerText = text[lang].title;
  document.getElementById("p1").innerText = text[lang].p1;
  document.getElementById("p2").innerText = text[lang].p2;
  document.getElementById("p3").innerText = text[lang].p3;
}
</script>

</body>
</html>
