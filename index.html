<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>中国自然景观 | 중국 자연</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* 视频背景 */
.video-section {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay-text {
  position: relative;
  z-index: 2;
  text-align: center;
  top: 40%;
}

h1 {
  font-size: 60px;
  transition: 0.3s;
}

/* 滚动渐隐 */
.fade-section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 40px;
  opacity: 0;
  transform: translateY(50px);
  transition: 1s;
}

/* 图片视差 */
.parallax {
  height: 100vh;
  background-image: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470');
  background-attachment: fixed;
  background-size: cover;
}

/* 按钮 */
.btn {
  margin-top: 20px;
  padding: 10px 25px;
  border: 1px solid white;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- 🎥 视频开场 -->
<section class="video-section">
  <video autoplay muted loop>
    <source src="shiping.mp4" type="video/mp4">
  </video>

  <div class="overlay-text">
    <h1 id="title">探索中国绝美自然</h1>
    <div class="btn" onclick="switchLang()">中文 / 한국어</div>
  </div>
</section>

<!-- 🌊 滚动动画 -->
<section class="fade-section" id="s1">张家界</section>
<section class="parallax"></section>
<section class="fade-section" id="s2">九寨沟</section>
<section class="fade-section" id="s3">黄山</section>

<script>
/* 滚动动画 */
const sections = document.querySelectorAll('.fade-section');

window.addEventListener('scroll', () => {
  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      sec.style.opacity = 1;
      sec.style.transform = "translateY(0)";
    }
  });
});

/* 多语言 */
let lang = 'zh';

const text = {
  zh: {
    title: "探索中国绝美自然",
    s1: "张家界",
    s2: "九寨沟",
    s3: "黄山"
  },
  kr: {
    title: "중국의 아름다운 자연을 탐험하세요",
    s1: "장가계",
    s2: "구채구",
    s3: "황산"
  }
};

function switchLang() {
  lang = lang === 'zh' ? 'kr' : 'zh';

  document.getElementById("title").innerText = text[lang].title;
  document.getElementById("s1").innerText = text[lang].s1;
  document.getElementById("s2").innerText = text[lang].s2;
  document.getElementById("s3").innerText = text[lang].s3;
}
</script>

</body>
</html>
